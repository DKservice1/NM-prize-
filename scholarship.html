<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <title>Power PH Scholarships</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-50 p-4">

    <!-- भाषा बदलने वाला छोटा बटन -->
    <button id="langBtn" onclick="toggleLanguage()" class="fixed top-4 right-4 bg-gray-900 text-white px-3 py-1 rounded-full text-[10px] font-bold shadow-lg z-50">
        English
    </button>

    <div class="max-w-md mx-auto mt-10">
        <h1 id="title" class="text-xl font-black text-center mb-6">स्कॉलरशिप प्रोग्राम्स</h1>
        
        <div class="space-y-4">
            <!-- कार्ड 1 -->
            <div class="bg-white p-4 rounded-2xl border shadow-sm">
                <img src="https://images.unsplash.com/photo-1523240795612-9a054b0db644?w=400" class="w-full h-32 object-cover rounded-xl mb-3" alt="Image 1">
                <h2 class="font-bold text-sm">Power PH Junior Merit Award</h2>
                <p class="desc text-xs text-gray-600 mt-1">कक्षा 6वीं से 9वीं के छात्रों के लिए विशेष छात्रवृत्ति।</p>
                <button class="mt-3 bg-gray-900 text-white px-3 py-1 rounded-lg text-[10px] font-bold">Apply Now</button>
            </div>

            <!-- कार्ड 2 -->
            <div class="bg-white p-4 rounded-2xl border shadow-sm">
                <img src="https://images.unsplash.com/photo-1509062522246-3755977927d7?w=400" class="w-full h-32 object-cover rounded-xl mb-3" alt="Image 2">
                <h2 class="font-bold text-sm">Young Achievers Scholarship</h2>
                <p class="desc text-xs text-gray-600 mt-1">10वीं और 12वीं के विज्ञान और गणित के छात्रों के लिए सहायता।</p>
                <button class="mt-3 bg-gray-900 text-white px-3 py-1 rounded-lg text-[10px] font-bold">Apply Now</button>
            </div>

            <!-- कार्ड 3 -->
            <div class="bg-white p-4 rounded-2xl border shadow-sm">
                <img src="https://images.unsplash.com/photo-1522202176988-66273c2fd55f?w=400" class="w-full h-32 object-cover rounded-xl mb-3" alt="Image 3">
                <h2 class="font-bold text-sm">Exam Rocket Booster</h2>
                <p class="desc text-xs text-gray-600 mt-1">सरकारी नौकरी के एस्पिरेंट्स के लिए फ्री कोचिंग और मॉक टेस्ट।</p>
                <button class="mt-3 bg-gray-900 text-white px-3 py-1 rounded-lg text-[10px] font-bold">Apply Now</button>
            </div>
        </div>
    </div>

    <script>
        let isHindi = true;
        function toggleLanguage() {
            isHindi = !isHindi;
            document.getElementById('title').innerText = isHindi ? "स्कॉलरशिप प्रोग्राम्स" : "Scholarship Programs";
            const descs = document.querySelectorAll('.desc');
            const texts = isHindi ? 
                ["कक्षा 6वीं से 9वीं के छात्रों के लिए विशेष छात्रवृत्ति।", "10वीं और 12वीं के विज्ञान और गणित के छात्रों के लिए सहायता।", "सरकारी नौकरी के एस्पिरेंट्स के लिए फ्री कोचिंग और मॉक टेस्ट।"] :
                ["Special scholarship for class 6th to 9th students.", "Support for 10th & 12th science and math students.", "Free coaching and mock tests for govt exam aspirants."];
            descs.forEach((el, i) => el.innerText = texts[i]);
            document.getElementById('langBtn').innerText = isHindi ? "English" : "हिंदी";
        }
    </script>
</body>
</html>
