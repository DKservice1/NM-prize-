<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Power PH Scholarships</title>
    <!-- Tailwind CSS का इस्तेमाल किया है ताकि डिजाइन हर स्क्रीन पर अच्छा दिखे -->
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-50 font-sans">

    <!-- हिंदी-इंग्लिश बटन -->
    <div class="p-4 flex justify-end">
        <button onclick="toggleLanguage()" class="bg-blue-600 text-white px-4 py-2 rounded-lg text-sm font-bold shadow-md">
            English / हिंदी
        </button>
    </div>

    <!-- मेन सेक्शन -->
    <div class="max-w-4xl mx-auto p-4">
        <h1 id="main-title" class="text-2xl font-black text-center mb-6">स्कॉलरशिप प्रोग्राम्स</h1>
        
        <div class="space-y-6">
            <!-- स्कॉलरशिप कार्ड 1 -->
            <div class="bg-white p-4 rounded-2xl shadow-sm border flex flex-col md:flex-row gap-4">
                <img src="https://images.unsplash.com/photo-1523240795612-9a054b0db644?w=400" class="w-full md:w-48 h-32 object-cover rounded-xl" alt="Image">
                <div>
                    <h2 class="font-bold text-lg">Power PH Junior Merit Award</h2>
                    <p class="text-sm text-gray-600 mt-1">कक्षा 6वीं से 9वीं के छात्रों के लिए विशेष छात्रवृत्ति। अपनी नींव को आज ही मजबूत करें।</p>
                    <button class="mt-3 bg-gray-900 text-white px-4 py-2 rounded-lg text-xs font-bold">Apply Now</button>
                </div>
            </div>

            <!-- स्कॉलरशिप कार्ड 2 -->
            <div class="bg-white p-4 rounded-2xl shadow-sm border flex flex-col md:flex-row gap-4">
                <img src="https://images.unsplash.com/photo-1509062522246-3755977927d7?w=400" class="w-full md:w-48 h-32 object-cover rounded-xl" alt="Image">
                <div>
                    <h2 class="font-bold text-lg">Young Achievers Scholarship</h2>
                    <p class="text-sm text-gray-600 mt-1">10वीं और 12वीं के विज्ञान और गणित के छात्रों के लिए एक्सपर्ट गाइडेंस और आर्थिक सहायता।</p>
                    <button class="mt-3 bg-gray-900 text-white px-4 py-2 rounded-lg text-xs font-bold">Apply Now</button>
                </div>
            </div>
        </div>
    </div>

    <!-- लैंग्वेज फंक्शन -->
    <script>
        function toggleLanguage() {
            const title = document.getElementById('main-title');
            if (title.innerText === "स्कॉलरशिप प्रोग्राम्स") {
                title.innerText = "Scholarship Programs";
            } else {
                title.innerText = "स्कॉलरशिप प्रोग्राम्स";
            }
        }
    </script>
</body>
</html>
