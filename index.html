<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Power PH - All-in-One Dashboard</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700;900&display=swap');
        body { font-family: 'Inter', sans-serif; background-color: #f3f4f6; overflow: hidden; }
        
        #sidebar { transition: transform 0.3s ease-in-out; }
        .sidebar-open { transform: translateX(0) !important; }
        .page-content { display: none; }
        .page-active { display: block; }
        
        .nav-link-active { background-color: #1d4ed8 !important; border-radius: 12px; }
        .custom-scroll::-webkit-scrollbar { width: 3px; }
        .custom-scroll::-webkit-scrollbar-thumb { background: #1e3a8a; }
    </style>
</head>
<body class="text-gray-800">

    <div class="flex h-screen overflow-hidden">
        
        <aside id="sidebar" class="fixed inset-y-0 left-0 z-50 w-64 bg-[#0a192f] text-white flex flex-col p-5 transform -translate-x-full md:relative md:translate-x-0 md:flex shrink-0 shadow-2xl">
            <button onclick="toggleSidebar()" class="md:hidden absolute top-4 right-4 text-2xl text-gray-400">&times;</button>

            <div class="mb-10 px-2">
                <div class="flex items-center gap-2">
                    <span class="text-yellow-400 text-3xl">⚡</span>
                    <h1 class="text-2xl font-black tracking-tighter italic">POWER PH</h1>
                </div>
                <p class="text-[9px] text-blue-300 tracking-widest uppercase font-bold">Empowering Your Future</p>
            </div>

            <nav class="flex-1 space-y-1 overflow-y-auto custom-scroll pr-2">
                <button onclick="showPage('home', this)" class="nav-btn nav-link-active w-full flex items-center gap-4 p-3 hover:bg-white/10 transition">
                    <i class="fas fa-home w-5"></i> Home
                </button>
                <button onclick="showPage('profile', this)" class="nav-btn w-full flex items-center gap-4 p-3 hover:bg-white/10 transition">
                    <i class="fas fa-user-circle w-5"></i> My Profile
                </button>
                <button onclick="showPage('refer', this)" class="nav-btn w-full flex items-center gap-4 p-3 hover:bg-white/10 transition">
                    <i class="fas fa-share-nodes w-5"></i> Refer & Earn
                </button>
                <button onclick="showPage('contribution', this)" class="nav-btn w-full flex items-center gap-4 p-3 hover:bg-white/10 transition border-b border-gray-700 pb-5 mb-5">
                    <i class="fas fa-hand-holding-heart w-5"></i> Contribution
                </button>

                <div class="text-[10px] text-gray-500 uppercase font-bold px-3 mb-2 tracking-widest">Scholarships</div>
                <button onclick="showPage('scholarship', this)" class="nav-btn w-full flex items-center gap-4 p-3 text-sm hover:bg-white/10 transition ml-2">
                    <i class="fas fa-chevron-right text-[10px]"></i> 8th to 10th
                </button>
                <button onclick="showPage('scholarship', this)" class="nav-btn w-full flex items-center gap-4 p-3 text-sm hover:bg-white/10 transition ml-2">
                    <i class="fas fa-chevron-right text-[10px]"></i> Higher Education
                </button>

                <div class="pt-6 space-y-1">
                    <button onclick="showPage('ebooks', this)" class="nav-btn w-full flex items-center gap-4 p-3 hover:bg-white/10 transition"><i class="fas fa-book w-5"></i> eBooks</button>
                    <button onclick="showPage('videos', this)" class="nav-btn w-full flex items-center gap-4 p-3 hover:bg-white/10 transition"><i class="fas fa-video w-5"></i> Videos</button>
                    <button onclick="showPage('reels', this)" class="nav-btn w-full flex items-center gap-4 p-3 hover:bg-white/10 transition"><i class="fas fa-bolt w-5 text-yellow-400"></i> Reels</button>
                    <button onclick="showPage('achievements', this)" class="nav-btn w-full flex items-center gap-4 p-3 hover:bg-white/10 transition"><i class="fas fa-trophy w-5"></i> Achievements</button>
                </div>

                <button onclick="window.location.reload()" class="w-full flex items-center gap-4 p-3 text-red-400 mt-10 border-t border-gray-700 pt-6 font-bold">
                    <i class="fas fa-sign-out-alt w-5"></i> Logout
                </button>
            </nav>
        </aside>

        <main class="flex-1 h-screen overflow-y-auto bg-white flex flex-col">

            <header class="bg-white p-4 flex justify-between items-center border-b px-6 md:px-10 sticky top-0 z-40">
                <button onclick="toggleSidebar()" class="md:hidden text-2xl text-[#0a192f]"><i class="fas fa-bars"></i></button>
                <div class="hidden md:block text-xs font-bold text-gray-400 uppercase tracking-widest">Dashboard / <span id="current-page-title">Home</span></div>
                
                <div class="flex items-center gap-3 cursor-pointer" onclick="showPage('profile')">
                    <div class="text-right hidden sm:block">
                        <p id="user-display-name" class="text-sm font-bold text-blue-900 leading-none">Rahul Kumar</p>
                        <p class="text-[9px] text-gray-400 mt-1">ID: PH-2026-001</p>
                    </div>
                    <img id="user-display-img" src="https://i.pravatar.cc/100?u=rahul" class="w-10 h-10 rounded-full border-2 border-blue-600 p-0.5">
                </div>
            </header>

            <div id="pages" class="p-4 md:p-8 flex-1">
                
                <div id="home-page" class="page-content page-active space-y-10">
                    <section class="relative bg-gradient-to-br from-blue-900 via-blue-800 to-blue-700 rounded-[2.5rem] p-8 md:p-14 text-white overflow-hidden shadow-2xl">
                        <div class="max-w-xl relative z-10">
                            <h2 class="text-4xl md:text-6xl font-black italic tracking-tighter mb-4 uppercase">National Merit Prize</h2>
                            <span class="bg-yellow-400 text-black px-4 py-1.5 font-black text-[10px] rounded uppercase shadow-lg">Scholarship For Your Bright Future</span>
                            <p class="mt-6 opacity-80 text-lg">शिक्षा का नया दौर, अब आपके साथ।</p>
                            <button onclick="showPage('profile')" class="mt-8 bg-pink-600 hover:bg-pink-700 px-10 py-4 rounded-2xl font-bold flex items-center gap-3 transition-all shadow-xl active:scale-95">
                                REGISTER NOW <i class="fas fa-arrow-right"></i>
                            </button>
                        </div>
                        <img src="https://cdn-icons-png.flaticon.com/512/3112/3112946.png" class="absolute right-10 bottom-10 w-72 hidden lg:block opacity-90 rotate-6">
                    </section>

                    <div class="grid grid-cols-1 md:grid-cols-3 gap-8">
                        <div onclick="showPage('scholarship')" class="bg-blue-50 p-8 rounded-[2rem] border border-blue-100 flex justify-between items-center cursor-pointer hover:shadow-xl transition group shadow-sm">
                            <div><h4 class="font-bold text-blue-900 uppercase">8th to 10th</h4><p class="text-xs text-gray-500 mt-1 mb-6">School Level</p><button class="bg-blue-600 text-white px-5 py-2 rounded-lg text-[10px] font-bold">DETAILS</button></div>
                            <i class="fas fa-user-graduate text-5xl text-blue-200 group-hover:scale-110 transition"></i>
                        </div>
                        </div>
                </div>

                <div id="profile-page" class="page-content space-y-8 max-w-2xl mx-auto">
                    <div class="bg-white p-8 rounded-[2rem] shadow-xl border border-gray-100">
                        <h2 class="text-2xl font-black text-blue-900 mb-6 uppercase">Student Profile</h2>
                        <div class="space-y-5">
                            <div><label class="text-[10px] font-bold text-gray-400 uppercase">Full Name</label>
                                <input type="text" id="nameInput" placeholder="Enter Name" class="w-full border-b-2 border-gray-100 p-3 outline-none focus:border-blue-600 transition"></div>
                            <div><label class="text-[10px] font-bold text-gray-400 uppercase">Email Address</label>
                                <input type="email" id="emailInput" placeholder="Email" class="w-full border-b-2 border-gray-100 p-3 outline-none focus:border-blue-600 transition"></div>
                            <div><label class="text-[10px] font-bold text-gray-400 uppercase">Mobile Number</label>
                                <input type="tel" id="phoneInput" placeholder="Mobile" class="w-full border-b-2 border-gray-100 p-3 outline-none focus:border-blue-600 transition"></div>
                            <button onclick="saveProfile()" class="w-full bg-[#0a192f] text-white font-bold py-4 rounded-2xl shadow-lg hover:bg-blue-900 transition">UPDATE PROFILE</button>
                        </div>
                    </div>
                </div>

                <div id="generic-page" class="page-content text-center py-20">
                    <i id="generic-icon" class="fas fa-tools text-64 text-gray-200 text-7xl mb-6"></i>
                    <h2 id="generic-title" class="text-3xl font-black text-gray-400 uppercase">Coming Soon</h2>
                    <p class="text-gray-400 mt-2">हम इस पेज पर काम कर रहे हैं।</p>
                    <button onclick="showPage('home')" class="mt-8 text-blue-600 font-bold underline">Go Back Home</button>
                </div>

            </div>
        </main>
    </div>

    <div id="overlay" onclick="toggleSidebar()" class="fixed inset-0 bg-black/50 z-40 hidden"></div>

    <script>
        // NAVIGATION LOGIC
        function showPage(pageId, btnElement) {
            // Hide all pages
            document.querySelectorAll('.page-content').forEach(p => p.classList.remove('page-active'));
            
            // Show requested page (or generic)
            const target = document.getElementById(pageId + '-page');
            if (target) {
                target.classList.add('page-active');
            } else {
                document.getElementById('generic-page').classList.add('page-active');
                document.getElementById('generic-title').innerText = pageId;
            }

            // Update Header Title
            document.getElementById('current-page-title').innerText = pageId.charAt(0).toUpperCase() + pageId.slice(1);

            // Update Sidebar Active Class
            if (btnElement) {
                document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('nav-link-active'));
                btnElement.classList.add('nav-link-active');
            }

            // Close sidebar on mobile after click
            if (window.innerWidth < 768) toggleSidebar();
        }

        // SIDEBAR TOGGLE
        function toggleSidebar() {
            const sidebar = document.getElementById('sidebar');
            const overlay = document.getElementById('overlay');
            sidebar.classList.toggle('sidebar-open');
            overlay.classList.toggle('hidden');
        }

        // SAVE PROFILE DATA
        function saveProfile() {
            const name = document.getElementById('nameInput').value;
            if (name) {
                document.getElementById('user-display-name').innerText = name;
                alert('Profile Updated Successfully!');
                showPage('home');
            } else {
                alert('Please enter a name');
            }
        }
    </script>
</body>
</html>
