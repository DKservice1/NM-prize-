<!DOCTYPE html><html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Power PH Mobile Ready</title>
<script src="https://cdn.tailwindcss.com"></script>
</head><body class="bg-gray-100"><!-- MOBILE HEADER --><div class="flex md:hidden justify-between items-center bg-blue-900 text-white p-4">
  <h1 class="font-bold">⚡ Power PH</h1>
  <button onclick="toggleMenu()" class="text-2xl">☰</button>
</div><div class="flex"><!-- SIDEBAR --><div id="sidebar" class="fixed md:relative top-0 left-0 h-full w-64 bg-blue-900 text-white p-5 transform -translate-x-full md:translate-x-0 transition duration-300 z-50 overflow-y-auto">
  <h1 class="text-xl font-bold mb-4">⚡ Power PH</h1><button onclick="openPage('home')" class="menu">🏠 Home</button> <button onclick="openPage('profile')" class="menu">👤 Profile</button> <button onclick="openPage('refer')" class="menu">💰 Refer</button> <button onclick="openPage('videos')" class="menu">🎥 Videos</button> <button onclick="openPage('reels')" class="menu">📱 Reels</button>

</div><div id="overlay" onclick="toggleMenu()" class="fixed inset-0 bg-black bg-opacity-50 hidden md:hidden"></div><!-- MAIN --><div class="flex-1 p-4 md:p-6 w-full"><!-- HOME --><div id="home" class="page">
  <div class="bg-gradient-to-r from-blue-900 to-blue-600 text-white p-5 rounded-xl">
    <h2 class="text-2xl md:text-4xl font-bold">National Merit Prize</h2>
    <p class="mt-2">Scholarship for your bright future</p>
    <a href="#" class="inline-block mt-4 bg-green-500 px-5 py-2 rounded-lg">Register Now</a>
  </div>  <div class="grid grid-cols-1 md:grid-cols-3 gap-4 mt-6">
    <div class="card">8th to 10th Scholarship</div>
    <div class="card">11th to Higher</div>
    <div class="card">Govt Exams</div>
  </div>
</div><!-- VIDEOS --><div id="videos" class="page hidden">
  <h2 class="text-xl font-bold mb-3">Videos</h2>
  <iframe class="w-full h-56 md:h-72 rounded" src="https://www.youtube.com/embed/dQw4w9WgXcQ"></iframe>
</div><!-- REELS --><div id="reels" class="page hidden">
  <h2 class="text-xl font-bold mb-3">Reels</h2>
  <div class="flex gap-3 overflow-x-auto">
    <iframe width="180" height="300" src="https://www.youtube.com/embed/dQw4w9WgXcQ"></iframe>
    <iframe width="180" height="300" src="https://www.youtube.com/embed/ysz5S6PUM-U"></iframe>
  </div>
</div><!-- PROFILE --><div id="profile" class="page hidden">
  <h2 class="text-xl font-bold">User Profile</h2>
  <p>Coming soon...</p>
</div><!-- REFER --><div id="refer" class="page hidden">
  <h2 class="text-xl font-bold">Refer & Earn</h2>
  <p>Invite and earn rewards.</p>
</div></div>
</div><!-- FOOTER --><footer class="bg-blue-900 text-white text-center p-3 mt-6">
  Power PH Company
</footer><style>
.menu{display:block;width:100%;text-align:left;padding:10px;margin-bottom:5px;border-radius:6px}
.menu:hover{background:#1e40af}
.card{background:white;padding:15px;border-radius:10px;box-shadow:0 2px 5px rgba(0,0,0,0.1)}
</style><script>
function toggleMenu(){
 document.getElementById('sidebar').classList.toggle('-translate-x-full');
 document.getElementById('overlay').classList.toggle('hidden');
}

function openPage(id){
 document.querySelectorAll('.page').forEach(p=>p.classList.add('hidden'));
 document.getElementById(id).classList.remove('hidden');
 toggleMenu();
}

window.onload=function(){openPage('home')}
</script></body>
</html>
